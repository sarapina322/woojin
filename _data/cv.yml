    Research Experience:
      - company: Mintlab, Korea University
        position: Graduate Researcher
        location: Seoul, South Korea
        start_date: "2025-03-01"
        end_date: Present
        summary: "Advisor: Prof. Daekyum Kim"
        highlights:
          - Developing a self-supervised learning framework for wearable cardiometabolic estimation from unlabeled sensor streams.
          - Designing cross-modal alignment between physiological sensor embeddings and text representations for interpretable, actionable health feedback.
          - Leading a smart Foley catheter project for neurogenic bladder, including sensing algorithms, device prototyping, ex-vivo validation, and clinical preparation.

      - company: Mintlab, Korea University
        position: Undergraduate Researcher
        location: Seoul, South Korea
        start_date: "2024-06-01"
        end_date: "2025-02-01"
        summary: "Advisor: Prof. Daekyum Kim"
        highlights:
          - Prototyped a wrist-worn wearable integrating PPG and 6-axis IMU sensors for human state estimation.
          - Implemented firmware for synchronized optical and motion signal acquisition and collected controlled exercise data.
          - Designed a motor-driven pinch valve mechanism and ex-vivo porcine bladder simulation protocol for automated urination control research.

    Projects:
      - name: Wearable Cardiometabolic Estimation
        url: /projects/wearable-cardiometabolic-estimation/
        summary: Kinematics-aware self-supervised learning for wearable-based cardiorespiratory fitness estimation and short-horizon physiological forecasting.
        highlights:
          - Built around multimodal wrist signals such as PPG and accelerometry.
          - Links representation learning with personalized intervention design.

      - name: "Frailty Zero: Multimodal Foundation Model for Frailty Assessment"
        url: /projects/frailty-zero-foundation-model/
        summary: Part of a national initiative aimed at preemptive frailty intervention in a hyper-aged society.
        highlights:
          - Contributing to multimodal foundation model development for frailty assessment and prevention.
          - Connected to broader preventive healthcare and service translation goals.

      - name: Smart Catheter System for Neurogenic Bladder
        url: /projects/smart-catheter-system/
        summary: Closed-loop autonomous catheter system to preserve long-term bladder compliance and function.
        highlights:
          - Includes sensing algorithm development, device prototyping, validation, and clinical preparation.
          - Related patent filed in Korea in 2026.

      - name: Leadership, Service, and Sports Communication
        url: /projects/international-engagement-and-service/
        summary: Student leadership, sports communication, athlete support, and global engagement activities.
        highlights:
          - Includes KUISA, ANOC, adaptive sports volunteering, sports journalism, and sports industry internships.

